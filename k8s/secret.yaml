apiVersion: v1
kind: Secret
metadata:
  name: book-api-secret
  namespace: diploma-demo
type: Opaque
# stringData accepts plain text – Kubernetes encodes the values automatically.
# To use pre-encoded values instead, replace stringData with data and supply base64 strings:
#   echo -n "your-value" | base64
stringData:
  DB_USER: "books"
  DB_PASSWORD: "books"
  POSTGRES_DB: "booksdb"
