# ── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ── Datasource (PostgreSQL) ──────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/booksdb}
spring.datasource.username=${DB_USER:books}
spring.datasource.password=${DB_PASSWORD:books}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# ── Redis ────────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ── Actuator ─────────────────────────────────────────────────────────────────
# Deny all endpoints by default, then explicitly allow only health and info.
# This prevents accidental exposure of sensitive endpoints (env, beans, etc.).
management.endpoints.web.exposure.exclude=*
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
